name: Build PatchCleaner

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    strategy:
      matrix:
        platform: [x64, Win32]
        configuration: [Release, Debug]

    steps:
      - name: Checkout PatchCleaner
        uses: actions/checkout@v4
        with:
          repository: recall0131/PatchCleaner
          submodules: recursive

      - name: Add MSBuild to PATH
        uses: microsoft/setup-msbuild@v2

      - name: Build
        run: msbuild PatchCleaner.sln /p:Configuration=${{ matrix.configuration }} /p:Platform=${{ matrix.platform }} /m

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: PatchCleaner-${{ matrix.configuration }}-${{ matrix.platform }}
          path: Build/${{ matrix.configuration }}.${{ matrix.platform }}/PatchCleaner.exe
